<!DOCTYPE html>
<html>
<head>
    <title>Post Job</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
        }

        .box {
            width: 400px;
            margin: 60px auto;
            padding: 25px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #1e40af;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Post New Job</h2>

    <form method="POST">

        <input type="text"
               name="job_type"
               placeholder="Job Type (Internship / Full Time)"
               required>

        <input type="text"
               name="stipend"
               placeholder="Stipend"
               required>

        <input type="date"
               name="last_date_to_apply"
               required>

        <button type="submit">Post Job</button>

    </form>
</div>

</body>
</html>d
